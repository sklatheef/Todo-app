{% extends 'main.html' %}

{% block content %}
<style>
    .glass-form {
        margin: 50px auto;
        padding: 30px;
        max-width: 500px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-radius: 15px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        color: #fff;
    }
    .glass-input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 5px;
        color: white;
    }
    .glass-button {
        background: #00d4ff;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }
</style>

<div class="glass-form">
    <h2>Add New Task</h2>
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="task" placeholder="Task Name" class="glass-input" required>
        <textarea name="desc" placeholder="Description" class="glass-input" rows="4" required></textarea>
        <button type="submit" class="glass-button">Create Task</button>
    </form>
</div>
{% endblock %}
