{% extends 'main.html' %}

{% block content %}
<style>
    .glass-form {
        margin: 50px auto;
        padding: 30px;
        max-width: 500px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-radius: 15px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #fff;
    }

    .glass-input {
        width: 100%;
        padding: 12px;
        margin: 15px 0;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        color: white;
        box-sizing: border-box; /* Important for padding */
    }

    .glass-button {
        background: #00d4ff;
        color: #1a1a2e;
        border: none;
        padding: 12px 25px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
    }
</style>

<div class="glass-form">
    <h2>Edit Task</h2>
    <form method="POST">
        {% csrf_token %}
        <label>Task Title</label>
        <input type="text" name="task" value="{{ task.task }}" class="glass-input" required>
        
        <label>Description</label>
        <textarea name="desc" class="glass-input" rows="5" required>{{ task.desc }}</textarea>
        
        <button type="submit" class="glass-button">Update Task</button>
        <div style="text-align: center; margin-top: 15px;">
            <a href="{% url 'display' %}" style="color: white; text-decoration: none; font-size: 0.9rem; opacity: 0.7;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
