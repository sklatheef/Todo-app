{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Application</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/nav.css' %}">
    <link rel="stylesheet" href="{% static 'css/footer.css' %}">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Flexbox setup to push footer down */
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            background-attachment: fixed;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 0;
            /* This ensures the container takes up all space between nav and footer */
            flex: 1; 
            background: transparent !important;
        }

        /* Nav styling */
        nav {
            background: rgba(255, 255, 255, 0.05) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Updated Footer styling for high contrast */
        footer {
            background: rgba(255, 255, 255, 0.8) !important; /* Lighter for black text visibility */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            padding: 20px 0;
            width: 100%;
        }
    </style>
</head>
<body>
    {% include 'nav.html' %}

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    {% include 'footer.html' %}
</body>
</html>
